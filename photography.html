<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Photography — Shamair Ahmed</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #FAF7F3; }
    @keyframes softFade { from { opacity: 0; } to { opacity: 1; } }
    .masonry { column-width: 300px; column-gap: clamp(12px,2vw,20px); }
    .masonry > div { break-inside: avoid; margin-bottom: clamp(12px,2vw,20px); }
  </style>
</helmet>

<div style="font-family:'Hanken Grotesk',sans-serif; background:#FAF7F3; color:#1E1A16; overflow-x:hidden;" data-screen-label="Photography">

  <header style="position:sticky; top:0; z-index:60; display:flex; justify-content:space-between; align-items:center; padding:clamp(18px,3vw,28px) clamp(20px,6vw,56px); background:#FAF7F3; border-bottom:1px solid rgba(30,26,22,0.08);">
    <a href="index.html" style="display:flex; align-items:center; text-decoration:none;">
      <img src="assets/logo/aperture-mark.png" alt="Shamair Ahmed" style="height:28px; width:auto; display:block;" />
    </a>
    <button onClick="{{ toggleMenu }}" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:10px; font-family:'Hanken Grotesk',sans-serif; font-size:12px; letter-spacing:0.18em; color:#1E1A16; text-transform:uppercase; padding:8px;">
      Menu
      <span style="display:flex; flex-direction:column; gap:4px;">
        <span style="width:18px; height:1px; background:#1E1A16; display:block;"></span>
        <span style="width:18px; height:1px; background:#1E1A16; display:block;"></span>
      </span>
    </button>
  </header>

  <main style="max-width:1500px; margin:0 auto; padding:clamp(40px,6vw,64px) clamp(20px,6vw,56px) clamp(80px,10vw,120px);">
    <h1 style="font-family:'Bodoni Moda',serif; font-style:italic; font-weight:400; font-size:clamp(32px,5vw,52px); color:#1E1A16; margin:0 0 clamp(36px,6vw,56px);">Photography</h1>

    <div class="masonry">
      <sc-for list="{{ photos }}" as="photo" hint-placeholder-count="29">
        <div><img src="{{ photo }}" alt="" style="width:100%; height:auto; display:block; border-radius:14px; transition:transform 0.7s cubic-bezier(.16,1,.3,1);" style-hover="transform:scale(1.03);" /></div>
      </sc-for>
    </div>
  </main>

  <footer style="padding:clamp(40px,6vw,64px) clamp(20px,6vw,56px) clamp(32px,5vw,48px); border-top:1px solid rgba(30,26,22,0.1); display:flex; flex-wrap:wrap; gap:24px; justify-content:space-between; align-items:center;">
    <img src="assets/logo/aperture-mark.png" alt="Shamair Ahmed" style="height:22px; width:auto; opacity:0.85;" />
    <nav style="display:flex; flex-wrap:wrap; gap:clamp(16px,3vw,32px);">
      <a href="index.html" style="font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#6B6259; text-decoration:none; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">Home</a>
      <a href="projects.html" style="font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#6B6259; text-decoration:none; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">Projects</a>
      <a href="photography.html" style="font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#6B6259; text-decoration:none; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">Photography</a>
      <a href="headshots.html" style="font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#6B6259; text-decoration:none; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">Headshots</a>
      <a href="contact.html" style="font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#6B6259; text-decoration:none; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">Contact</a>
    </nav>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="https://instagram.com/6.lenz" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex; color:#1E1A16; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5.5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle></svg>
      </a>
      <span style="font-family:'Hanken Grotesk',sans-serif; font-size:12px; color:#8B8378;">© 2026 Shamair Ahmed</span>
    </div>
  </footer>

  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; inset:0; background:#FAF7F3; z-index:200; display:flex; flex-direction:column; justify-content:center; padding:clamp(32px,8vw,80px); animation:softFade 0.4s ease;">
      <button onClick="{{ toggleMenu }}" style="position:absolute; top:clamp(20px,3vw,36px); right:clamp(20px,6vw,56px); background:none; border:none; color:#1E1A16; font-family:'Hanken Grotesk',sans-serif; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer;">Close ✕</button>
      <nav style="display:flex; flex-direction:column; gap:clamp(12px,2vw,18px);">
        <a href="index.html" style="font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:clamp(32px,7vw,44px); color:#1E1A16; text-decoration:none; letter-spacing:-0.01em;" style-hover="color:#7E9178 !important;">Home</a>
        <a href="projects.html" style="font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:clamp(32px,7vw,44px); color:#1E1A16; text-decoration:none; letter-spacing:-0.01em;" style-hover="color:#7E9178 !important;">Projects</a>
        <a href="photography.html" style="font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:clamp(32px,7vw,44px); color:#1E1A16; text-decoration:none; letter-spacing:-0.01em;" style-hover="color:#7E9178 !important;">Photography</a>
        <a href="headshots.html" style="font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:clamp(32px,7vw,44px); color:#1E1A16; text-decoration:none; letter-spacing:-0.01em;" style-hover="color:#7E9178 !important;">Headshots</a>
        <a href="contact.html" style="font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:clamp(32px,7vw,44px); color:#1E1A16; text-decoration:none; letter-spacing:-0.01em;" style-hover="color:#7E9178 !important;">Contact</a>
      </nav>
      <div style="position:absolute; bottom:clamp(32px,6vw,56px); left:clamp(32px,8vw,80px); display:flex; align-items:center; gap:16px;">
        <span style="font-family:'Hanken Grotesk',sans-serif; color:#8B8378; font-size:14px;">Oakville, ON</span>
        <a href="https://instagram.com/6.lenz" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex; align-items:center; color:#1E1A16; transition:color 0.25s ease;" style-hover="color:#7E9178 !important;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5.5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle></svg>
        </a>
      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const PHOTOS = [
  "assets/optimized/hero-b-marina.jpg",
  "assets/optimized/highlight-8.jpg",
  "assets/optimized/gallery-watch.jpg",
  "assets/optimized/cine-3.jpg",
  "assets/optimized/gallery-boat.jpg",
  "assets/optimized/highlight-2.jpg",
  "assets/optimized/gallery-prom-group.jpg",
  "assets/optimized/cine-1.jpg",
  "assets/optimized/gallery-portrait-moody.jpg",
  "assets/optimized/event-3.jpg",
  "assets/optimized/highlight-3.jpg",
  "assets/optimized/gallery-concert-2.jpg",
  "assets/optimized/gallery-corsage.jpg",
  "assets/optimized/cine-4.jpg",
  "assets/optimized/gallery-friends.jpg",
  "assets/optimized/highlight-10-concert.jpg",
  "assets/optimized/cine-5.jpg",
  "assets/optimized/event-4.jpg",
  "assets/optimized/highlight-6.jpg",
  "assets/optimized/gallery-concert-1.jpg",
  "assets/optimized/car-1-gti.jpg",
  "assets/optimized/car-2-civic-engine.jpg",
  "assets/optimized/car-3-typer.jpg",
  "assets/optimized/car-4-lambo.jpg",
  "assets/optimized/car-5-gtr.jpg",
  "assets/optimized/car-6-m4.jpg",
  "assets/optimized/car-7-m2-engine.jpg",
  "assets/optimized/car-8-m4-engine.jpg",
  "assets/optimized/cine-2.jpg",
];

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i];
    a[i] = a[j];
    a[j] = tmp;
  }
  return a;
}

class Component extends DCLogic {
  state = { menuOpen: false, photos: shuffled(PHOTOS) };

  renderVals() {
    return {
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      photos: this.state.photos,
    };
  }
}
</script>
</body>
</html>
